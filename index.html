<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <title>Split — Room Grocery Tracker</title>

  <meta name="description" content="Minimal grocery expense tracker for roommates and shared rooms.">
  <meta name="theme-color" content="#111111">

  <link rel="manifest" href="manifest.json">

  <link rel="icon" type="image/svg+xml" href="trolley_pro_icon.svg">
  <link rel="apple-touch-icon" href="trolley_pro_icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090908;
  --s1:#0F0F0D;
  --s2:#161614;
  --s3:#1E1D1B;
  --accent:#C8FF47;
  --accent-hover:#D4FF66;
  --text:#EDEAE1;
  --muted:#60594F;
  --dim:#38352F;
  --border:rgba(255,255,255,0.062);
  --border-hi:rgba(255,255,255,0.13);
  --green:#4BD98A;
  --green-dim:rgba(75,217,138,0.10);
  --font-d:'Unbounded',sans-serif;
  --font-b:'Syne',sans-serif;
}

html{
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-b);
  min-height:100vh;
}

.app{
  max-width:440px;
  margin:0 auto;
  padding:2.25rem 1.25rem 5rem;
}

.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:2.75rem;
}

.logo{
  font-family:var(--font-d);
  font-size:12px;
  font-weight:600;
  letter-spacing:.18em;
  color:var(--accent);
}

.hero{
  margin-bottom:2.25rem;
  padding-bottom:2.25rem;
  border-bottom:1px solid var(--border);
}

.hero-lbl{
  font-size:10px;
  color:var(--muted);
  letter-spacing:.15em;
  text-transform:uppercase;
  margin-bottom:.75rem;
}

.hero-amt{
  font-family:var(--font-d);
  font-size:clamp(40px,10vw,62px);
  font-weight:300;
  letter-spacing:-.03em;
  line-height:1;
  margin-bottom:1.25rem;
}

.add-wrap{
  margin-bottom:2rem;
}

.add-row{
  display:flex;
  gap:8px;
  margin-bottom:7px;
}

.amt-input{
  flex:1;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:11px;
  padding:14px;
  font-size:21px;
  color:var(--text);
  outline:none;
}

.add-btn{
  background:var(--accent);
  border:none;
  border-radius:11px;
  width:60px;
  cursor:pointer;
  font-size:24px;
}

.note-input{
  width:100%;
  background:transparent;
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;
  color:var(--text);
  outline:none;
}

.hist-list{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.h-item{
  display:flex;
  justify-content:space-between;
  background:var(--s1);
  padding:12px;
  border-radius:9px;
}
</style>
</head>

<body>

<div class="app">

<header class="hdr">
  <span class="logo">SPLIT</span>
</header>

<section class="hero">
  <p class="hero-lbl">Each person owes</p>
  <div class="hero-amt" id="share">₹0</div>
</section>

<section class="add-wrap">
  <div class="add-row">
    <input class="amt-input" id="amount" type="number" placeholder="Amount">
    <button class="add-btn" onclick="addExpense()">+</button>
  </div>

  <input class="note-input" id="note" type="text" placeholder="Milk, vegetables, etc.">
</section>

<section class="hist-list" id="history"></section>

</div>

<script>
const STORAGE_KEY = 'split_tracker_data';

let expenses = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
}

function format(n) {
  return '₹' + Number(n).toLocaleString('en-IN');
}

function render() {
  const total = expenses.reduce((sum, e) => sum + e.amount, 0);
  const share = total / 6;

  document.getElementById('share').innerText = format(share);

  const history = document.getElementById('history');

  history.innerHTML = expenses.map(e => `
    <div class="h-item">
      <span>${e.note}</span>
      <span>${format(e.amount)}</span>
    </div>
  `).join('');
}

function addExpense() {
  const amountInput = document.getElementById('amount');
  const noteInput = document.getElementById('note');

  const amount = parseFloat(amountInput.value);

  if (!amount || amount <= 0) return;

  expenses.unshift({
    amount,
    note: noteInput.value || 'Groceries'
  });

  save();
  render();

  amountInput.value = '';
  noteInput.value = '';
}

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('Service Worker Registered');
      })
      .catch(err => {
        console.log('SW Error:', err);
      });
  });
}
</script>

</body>
</html>
